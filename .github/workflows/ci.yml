name: CI-FOR-DevSecOps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deps: ${{ steps.filter.outputs.deps }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            deps:
              - 'backend/go.mod'
              - 'backend/go.sum'
              - 'frontend/package.json'
              - 'frontend/package-lock.json'

  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  sonar:
   name: SonarCloud Analysis
   runs-on: ubuntu-latest
   needs: detect-changes

   if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'

   steps:
     - uses: actions/checkout@v4
       with:
         fetch-depth: 0

     - name: Cache Sonar Packages
       uses: actions/cache@v4
       with:
         path: ~/.sonar/cache
         key: ${{ runner.os }}-sonar
         restore-keys: ${{ runner.os }}-sonar
           

     - name: Sonar Scan
       uses: sonarsource/sonarqube-scan-action@v6
       env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
         SONAR_ORG: ${{ secrets.SONAR_ORG }}
         SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

  owasp:
    name: OWASP Dependency Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.deps == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') 

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "skillpulse"
          path: "."
          format: "HTML"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/

  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    needs: detect-changes

    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy 
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          

  dockerfile-scan:
    name: Dockerfile Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: error
          ignore: DL3018

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  build-and-push:
    name: Build Secure Images
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - sonar
      - trivy-fs
      - dockerfile-scan
      - detect-changes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend build only if changed
      - name: Build Backend Image
        if: needs.detect-changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: himanshugohil18/skillpulse-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend build only if changed
      - name: Build Frontend Image
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: himanshugohil18/skillpulse-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: himanshugohil18/skillpulse-backend:latest
          format: table
          exit-code: 0
