name: CI-DevSecOps

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:

  # -------------------------
  # SECRET SCANNING
  # -------------------------
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------
  # SONARCLOUD CODE ANALYSIS
  # -------------------------
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -------------------------
  # OWASP DEPENDENCY CHECK
  # -------------------------
  owasp:
    name: OWASP Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "skillpulse"
          path: "."
          format: "HTML"
          out: "reports"

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports

  # -------------------------
  # TRIVY FILESYSTEM SCAN
  # -------------------------
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"

  # -------------------------
  # DOCKERFILE SECURITY
  # -------------------------
  hadolint:
    name: Dockerfile Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: error
          ignore: DL3018

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: error

  # -------------------------
  # BUILD + IMAGE SECURITY
  # -------------------------
  build-and-push:
    name: Build Secure Images
    runs-on: ubuntu-latest

    needs:
      - gitleaks
      - sonarcloud
      - owasp
      - trivy-fs
      - hadolint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------
      # BUILD BACKEND
      # -------------------------
      - name: Build Backend Image
        run: |
          docker build -t himanshugohil18/skillpulse-backend:latest ./backend

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "himanshugohil18/skillpulse-backend:latest"
          format: "table"
          severity: "CRITICAL,HIGH"

      - name: Push Backend Image
        run: |
          docker push himanshugohil18/skillpulse-backend:latest

      # -------------------------
      # BUILD FRONTEND
      # -------------------------
      - name: Build Frontend Image
        run: |
          docker build -t himanshugohil18/skillpulse-frontend:latest ./frontend

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "himanshugohil18/skillpulse-frontend:latest"
          format: "table"
          severity: "CRITICAL,HIGH"

      - name: Push Frontend Image
        run: |
          docker push himanshugohil18/skillpulse-frontend:latest
