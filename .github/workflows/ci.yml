name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # DEVSECOPS - SECRET SCAN
      # -------------------------
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # DEVSECOPS - FILESYSTEM SCAN
      # -------------------------
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # -------------------------
      # DOCKER SETUP
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # -------------------------
      # DOCKER LOGIN
      # -------------------------
      - name: Login to DockerHub
        uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------
      # BUILD + PUSH BACKEND
      # -------------------------
      - name: Build and Push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}

      # -------------------------
      # DEVSECOPS - BACKEND IMAGE SCAN
      # -------------------------
      - name: Run Trivy Backend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # -------------------------
      # BUILD + PUSH FRONTEND
      # -------------------------
      - name: Build and Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}

      # -------------------------
      # DEVSECOPS - FRONTEND IMAGE SCAN
      # -------------------------
      - name: Run Trivy Frontend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
